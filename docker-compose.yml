services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_ALCHEMY_ID=${NEXT_PUBLIC_ALCHEMY_ID}
      - NEXT_PUBLIC_INDEX_COOP_API=${NEXT_PUBLIC_INDEX_COOP_API}
      - NEXT_PUBLIC_IP_LOOKUP_KEY=
      - NEXT_PUBLIC_TENDERLY_ACCESS_KEY=${NEXT_PUBLIC_TENDERLY_ACCESS_KEY}
      - NEXT_PUBLIC_TENDERLY_USER=${NEXT_PUBLIC_TENDERLY_USER}
      - NEXT_PUBLIC_VERCEL_ENV=development
      - NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID}
